<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Результат</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #000000, #0a0a1f);
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* Заголовок */
.title {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 20px;
    font-size: 28px;
    text-shadow: 0 0 10px pink;
}

/* Кнопка */
.btn {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: pink;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

/* Canvas */
canvas {
    display: block;
}
</style>
</head>
<body>

<div class="title">{{ message }}</div>
<button class="btn" onclick="startMagic()">Песенка ✨</button>

<canvas id="heart"></canvas>

<audio id="music" loop>
    <source src="{{ url_for('static', filename='music/song.mp3') }}" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let angle = 0;

function heartFunction(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t) - Math.cos(4*t))
    };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    angle += 0.02;

    const scale = Math.min(canvas.width, canvas.height) / 45;

    for (let t = 0; t < Math.PI * 2; t += 0.04) {
        let p = heartFunction(t);

        // 🔥 ВСЕГДА центр
        let x = canvas.width / 2.1 + p.x * scale;
        let y = canvas.height / 2 + p.y * scale;

        // вращение
        let dx = Math.cos(angle + t * 5) * 8;
        let dy = Math.sin(angle + t * 5) * 8;

        let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, "pink");
        gradient.addColorStop(0.5, "red");
        gradient.addColorStop(1, "purple");

        let hue = (angle * 50 + t * 100) % 360;
        ctx.fillStyle = "hsl(" + hue + ", 100%, 60%)";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "red";
        ctx.font = "14px Arial";

        ctx.fillText("I LOVE YOU", x + dx, y + dy);
    }

    let playing = false;

function toggleMusic() {
    let music = document.getElementById("music");

    if (!playing) {
        music.play();
        playing = true;
    } else {
        music.pause();
        playing = false;
    }
}

    requestAnimationFrame(draw);
}

draw();

// музыка
function startMagic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
