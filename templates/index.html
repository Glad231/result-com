<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

input:focus {
    outline: none;
    border: 1px solid #667eea;
    box-shadow: 0 0 10px #667eea;
}

button:active {
    transform: scale(0.95);
}

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Введи имя</h1>

    <form onsubmit="go(event)">
    <input type="text" id="name" placeholder="Твоё имя">
    <button type="submit">Отправить</button>
</form>

<script>
function go(e) {
    e.preventDefault();
    let name = document.getElementById("name").value || "Гость";
    window.location.href = "/result?name=" + encodeURIComponent(name);
}
</script>
</div>

</body>
</html>
